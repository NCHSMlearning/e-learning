<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NurseIQ Complete · Full Feature Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; }
        body { background: #f1f5f9; }
        .card { background: white; border-radius: 24px; padding: 1.5rem; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .input, .select, textarea { border: 1.5px solid #e2e8f0; border-radius: 14px; padding: 10px 14px; width: 100%; font-size: 0.9rem; }
        .input:focus, .select:focus, textarea:focus { outline: none; border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79,70,229,0.1); }
        .btn-primary { background: #4f46e5; color: white; border: none; border-radius: 40px; padding: 10px 20px; cursor: pointer; font-weight: 600; }
        .btn-success { background: #10b981; color: white; border: none; border-radius: 40px; padding: 8px 16px; cursor: pointer; }
        .btn-danger { background: #ef4444; color: white; border: none; border-radius: 40px; padding: 8px 16px; cursor: pointer; }
        .btn-warning { background: #f59e0b; color: white; border: none; border-radius: 40px; padding: 8px 16px; cursor: pointer; }
        .badge { display: inline-flex; align-items: center; gap: 6px; padding: 4px 12px; border-radius: 40px; font-size: 0.7rem; font-weight: 600; }
        .folder { background: white; border-radius: 20px; padding: 1.2rem; border: 1px solid #eef2ff; cursor: pointer; transition: 0.2s; }
        .folder:hover { transform: translateY(-3px); box-shadow: 0 12px 24px -12px rgba(0,0,0,0.15); }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: white; border-radius: 28px; max-width: 700px; width: 90%; max-height: 85vh; overflow-y: auto; padding: 1.5rem; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .animate { animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
<div id="app">
    <!-- LOGIN -->
    <div id="login-section" style="min-height:100vh; display:flex; align-items:center; justify-content:center; background:linear-gradient(135deg,#eef2ff,#f8fafc)">
        <div class="card" style="max-width:400px; width:90%; text-align:center">
            <i class="fas fa-stethoscope" style="font-size:48px; color:#4f46e5;"></i>
            <h1 style="margin:1rem 0 0.5rem">NurseIQ <span style="color:#4f46e5">Complete</span></h1>
            <p style="color:#64748b; margin-bottom:1.5rem">Full admin suite · database ready</p>
            <div id="login-error" style="background:#fee2e2; border-radius:16px; padding:10px; margin-bottom:1rem; display:none"></div>
            <form id="login-form">
                <input type="email" id="login-email" class="input" placeholder="admin@example.com" required style="margin-bottom:1rem">
                <input type="password" id="login-password" class="input" placeholder="password" required style="margin-bottom:1.5rem">
                <button type="submit" id="login-btn" class="btn-primary" style="width:100%">Login <i class="fas fa-arrow-right"></i></button>
            </form>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div id="admin-dashboard" style="display:none">
        <div style="background:white; border-bottom:1px solid #e2e8f0; padding:0.8rem 2rem; display:flex; justify-content:space-between; align-items:center">
            <div><i class="fas fa-stethoscope" style="font-size:28px; color:#4f46e5"></i> <strong style="font-size:1.3rem">NurseIQ Complete</strong> <span class="badge" style="background:#e0e7ff">v4.0</span></div>
            <div><span id="user-name" style="background:#f1f5f9; padding:6px 16px; border-radius:40px"><i class="fas fa-user-shield"></i> Admin</span> <button onclick="logout()" class="btn-danger" style="padding:6px 14px">Logout</button></div>
        </div>
        <div style="display:flex; flex-wrap:wrap">
            <!-- SIDEBAR -->
            <div style="width:260px; background:#fefefe; border-right:1px solid #eef2ff; min-height:calc(100vh - 65px); padding:1.5rem 1rem">
                <div class="badge" style="background:#e0e7ff; margin-bottom:1rem"><i class="fas fa-chart-line"></i> Live Stats</div>
                <div style="background:#f8fafc; border-radius:20px; padding:1rem; margin-bottom:1.5rem">
                    <div style="display:flex; justify-content:space-between"><span>📚 Questions</span><strong id="stat-questions">0</strong></div>
                    <div style="display:flex; justify-content:space-between; margin-top:10px"><span>👥 Students</span><strong id="stat-students">0</strong></div>
                    <div style="display:flex; justify-content:space-between; margin-top:10px"><span>📖 Courses</span><strong id="stat-courses">0</strong></div>
                </div>
                <div style="display:flex; flex-direction:column; gap:8px">
                    <button onclick="showPage('rapid')" class="folder" style="background:#fff7ed; border-left:4px solid #f59e0b"><i class="fas fa-bolt"></i> ⚡ RAPID FIRE (fast entry)</button>
                    <button onclick="showPage('bulk')" class="folder"><i class="fas fa-file-import"></i> 📋 Bulk Paste + Parser</button>
                    <button onclick="showPage('ai')" class="folder"><i class="fas fa-robot"></i> 🤖 AI Generator</button>
                    <button onclick="showPage('bank')" class="folder"><i class="fas fa-folder-open"></i> 📁 Question Bank (full CRUD)</button>
                    <button onclick="showPage('students')" class="folder"><i class="fas fa-users"></i> 👩‍🎓 Student Management</button>
                    <button onclick="showPage('courses')" class="folder"><i class="fas fa-book"></i> 📘 Course Manager</button>
                </div>
            </div>
            <!-- MAIN CONTENT -->
            <div style="flex:1; padding:1.5rem; background:#f9fbfd" id="main-panel"></div>
        </div>
    </div>
</div>

<script>
    // ==================== SUPABASE SETUP ====================
    const SUPABASE_URL = 'https://lwhtjozfsmbyihenfunw.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx3aHRqb3pmc21ieWloZW5mdW53Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTk2NTgxMjcsImV4cCI6MjA3NTIzNDEyN30.7Z8AYvPQwTAEEEhODlW6Xk-IR1FK3Uj5ivZS7P17Wpk';
    let supabase = null;
    let currentUser = null;
    let allCourses = [];
    let currentQuestions = [];

    document.addEventListener('DOMContentLoaded', async () => {
        supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, { auth: { persistSession: false } });
        const session = localStorage.getItem('nurseiq_admin_session');
        if(session) { currentUser = JSON.parse(session); showDashboard(); await refreshStats(); await loadCourses(); }
    });

    document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('login-email').value.trim();
        const btn = document.getElementById('login-btn');
        btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
        try {
            const { data, error } = await supabase.from('consolidated_user_profiles_table').select('*').eq('email', email).limit(1);
            if(error || !data?.length) throw new Error('Admin not found');
            if(data[0].role !== 'superadmin' && data[0].role !== 'admin') throw new Error('Not admin');
            localStorage.setItem('nurseiq_admin_session', JSON.stringify({ id: data[0].id, email, name: data[0].full_name }));
            currentUser = data[0];
            showDashboard(); await refreshStats(); await loadCourses();
        } catch(err) { document.getElementById('login-error').style.display = 'block'; document.getElementById('login-error').innerHTML = err.message; btn.disabled = false; btn.innerHTML = 'Login'; }
    });

    async function refreshStats() {
        const { count: q } = await supabase.from('medical_assessments').select('*', { count: 'exact', head: true });
        const { count: s } = await supabase.from('consolidated_user_profiles_table').select('*', { count: 'exact', head: true });
        const { count: c } = await supabase.from('courses').select('*', { count: 'exact', head: true });
        document.getElementById('stat-questions').innerText = q || 0;
        document.getElementById('stat-students').innerText = s || 0;
        document.getElementById('stat-courses').innerText = c || 0;
    }

    async function loadCourses() { const { data } = await supabase.from('courses').select('*'); allCourses = data || []; }

    function showDashboard() { document.getElementById('login-section').style.display = 'none'; document.getElementById('admin-dashboard').style.display = 'block'; document.getElementById('user-name').innerHTML = `<i class="fas fa-user-check"></i> ${currentUser?.name || 'Admin'}`; showPage('bank'); }
    function logout() { localStorage.removeItem('nurseiq_admin_session'); document.getElementById('login-section').style.display = 'flex'; document.getElementById('admin-dashboard').style.display = 'none'; }

    const mainPanel = document.getElementById('main-panel');

    // ==================== RAPID FIRE (COMPLETE) ====================
    function renderRapid() {
        mainPanel.innerHTML = `
            <div class="card">
                <h2><i class="fas fa-bolt" style="color:#f59e0b"></i> RAPID FIRE · 10-second question creator</h2>
                <select id="rapid-course" class="select" style="margin:1rem 0"></select>
                <input id="rapid-q" class="input" placeholder="Question: What is the normal adult pulse rate?" style="margin-bottom:1rem">
                <div class="grid-2">
                    <input id="rapid-a" class="input" placeholder="Option A: 40-60 bpm">
                    <input id="rapid-b" class="input" placeholder="Option B: 60-100 bpm ✓">
                    <input id="rapid-c" class="input" placeholder="Option C: 100-120 bpm">
                    <input id="rapid-d" class="input" placeholder="Option D: 120-140 bpm">
                </div>
                <input id="rapid-ans" class="input" placeholder="Correct answer: 60-100 bpm" style="margin:1rem 0">
                <textarea id="rapid-exp" class="input" rows="2" placeholder="Explanation (optional)"></textarea>
                <button onclick="saveRapid()" class="btn-primary" style="width:100%; margin-top:1rem"><i class="fas fa-save"></i> SAVE INSTANTLY</button>
                <div id="rapid-msg" style="margin-top:1rem"></div>
            </div>`;
        const sel = document.getElementById('rapid-course');
        if(sel && allCourses.length) sel.innerHTML = '<option value="">-- select course --</option>' + allCourses.map(c => `<option value="${c.id}">${c.course_name}</option>`).join('');
    }

    window.saveRapid = async () => {
        const courseId = document.getElementById('rapid-course').value;
        if(!courseId) { alert('Select a course'); return; }
        const qText = document.getElementById('rapid-q').value.trim();
        if(!qText) { alert('Enter question'); return; }
        const answer = document.getElementById('rapid-ans').value.trim();
        if(!answer) { alert('Enter correct answer'); return; }
        const payload = {
            question_text: qText,
            correct_answer: answer,
            course_id: courseId,
            option_a: document.getElementById('rapid-a').value || null,
            option_b: document.getElementById('rapid-b').value || null,
            option_c: document.getElementById('rapid-c').value || null,
            option_d: document.getElementById('rapid-d').value || null,
            explanation: document.getElementById('rapid-exp').value || null,
            question_type: 'multiple_choice',
            difficulty: 'medium',
            curriculum: 'KRCHN',
            is_active: true,
            created_at: new Date().toISOString()
        };
        const { error } = await supabase.from('medical_assessments').insert([payload]);
        if(error) alert('Error: ' + error.message);
        else { document.getElementById('rapid-msg').innerHTML = '<span class="badge" style="background:#d1fae5; color:#065f46">✅ Saved! Ready for students</span>'; setTimeout(()=>document.getElementById('rapid-msg').innerHTML='',2000); refreshStats(); }
    };

    // ==================== BULK PASTE (FULL PARSER) ====================
    function renderBulk() {
        mainPanel.innerHTML = `
            <div class="card">
                <h2><i class="fas fa-copy"></i> Bulk Paste · MCQ Extractor</h2>
                <select id="bulk-course" class="select" style="margin:1rem 0"></select>
                <textarea id="bulk-text" class="input" rows="10" placeholder="Paste any format:&#10;1. What is normal BP?&#10;A) 90/60&#10;B) 120/80 ✓&#10;C) 140/90&#10;Answer: 120/80 mmHg&#10;&#10;2. Vitamin D is produced by?&#10;A) Food&#10;B) Sunlight ✓&#10;C) Water&#10;Answer: Sunlight"></textarea>
                <div style="display:flex; gap:1rem; margin:1rem 0">
                    <button onclick="parseAndPreview()" class="btn-primary"><i class="fas fa-magic"></i> Extract Questions</button>
                    <button onclick="clearBulk()" class="btn-warning">Clear All</button>
                </div>
                <div id="bulk-preview"></div>
            </div>`;
        const sel = document.getElementById('bulk-course');
        if(sel && allCourses.length) sel.innerHTML = '<option value="">-- select course --</option>' + allCourses.map(c => `<option value="${c.id}">${c.course_name}</option>`).join('');
    }

    window.parseAndPreview = () => {
        const raw = document.getElementById('bulk-text').value;
        const courseId = document.getElementById('bulk-course').value;
        if(!courseId) { alert('Select a course first'); return; }
        if(!raw.trim()) { alert('Paste questions first'); return; }
        
        const lines = raw.split(/\r?\n/).map(l=>l.trim()).filter(l=>l);
        let extracted = [];
        let current = null, opts = [], answer = '';
        
        for(let line of lines) {
            if(line.match(/^\d+[\.\)]/) || (line.includes('?') && !line.match(/^[A-D]/i))) {
                if(current && opts.length) extracted.push({ q: current, options: [...opts], ans: answer || opts[0] || '' });
                current = line.replace(/^\d+[\.\)]\s*/, '');
                opts = [];
                answer = '';
            } else if(line.match(/^[A-D][\.\)]\s*(.+)/i)) {
                let val = line.replace(/^[A-D][\.\)]\s*/, '').replace(/[✓✔]/g,'').trim();
                opts.push(val);
                if(line.includes('✓') || line.includes('✔')) answer = val;
            } else if(line.toLowerCase().startsWith('answer:')) {
                answer = line.replace(/answer:/i,'').trim();
            }
        }
        if(current && opts.length) extracted.push({ q: current, options: opts, ans: answer || opts[0] });
        
        if(extracted.length === 0) { document.getElementById('bulk-preview').innerHTML = '<div class="badge" style="background:#fee2e2">No MCQs detected. Use format: 1. Question? A) opt B) opt✓</div>'; return; }
        
        document.getElementById('bulk-preview').innerHTML = `
            <h3>📌 Found ${extracted.length} questions <button onclick="saveAllBulk('${courseId}', ${JSON.stringify(extracted).replace(/"/g, '&quot;')})" class="btn-success" style="margin-left:1rem">💾 Save All</button></h3>
            <div id="bulk-list">${extracted.map((q,i)=>`
                <div class="folder" style="margin-bottom:0.8rem; cursor:default">
                    <strong>Q${i+1}: ${q.q}</strong><br>
                    <span style="font-size:0.8rem">Options: ${q.options.join(' | ')}</span><br>
                    ✅ <strong>${q.ans}</strong>
                    <button onclick="saveSingleBulk('${courseId}', ${i}, ${JSON.stringify(extracted).replace(/"/g, '&quot;')})" class="btn-primary" style="padding:4px 12px; font-size:0.7rem; margin-top:8px">Save This</button>
                </div>
            `).join('')}</div>`;
        window.bulkCache = extracted;
    };
    
    window.saveSingleBulk = async (courseId, idx, cache) => {
        const q = cache[idx];
        const payload = { question_text: q.q, correct_answer: q.ans, course_id: courseId, option_a: q.options[0]||null, option_b: q.options[1]||null, option_c: q.options[2]||null, option_d: q.options[3]||null, question_type: 'multiple_choice', difficulty: 'medium', curriculum: 'KRCHN', is_active: true, created_at: new Date().toISOString() };
        const { error } = await supabase.from('medical_assessments').insert([payload]);
        if(error) alert(error.message); else { alert('Saved!'); refreshStats(); }
    };
    window.saveAllBulk = async (courseId, cache) => { for(let i=0;i<cache.length;i++) await saveSingleBulk(courseId, i, cache); alert(`✅ ${cache.length} questions saved`); refreshStats(); };
    window.clearBulk = () => { document.getElementById('bulk-text').value = ''; document.getElementById('bulk-preview').innerHTML = ''; };

    // ==================== AI GENERATOR ====================
    function renderAI() {
        mainPanel.innerHTML = `
            <div class="card">
                <h2><i class="fas fa-robot"></i> AI Question Generator</h2>
                <select id="ai-course" class="select" style="margin:1rem 0"></select>
                <textarea id="ai-topics" class="input" rows="3" placeholder="Enter topics: Cardiology, Pharmacology, Emergency Nursing, Anatomy"></textarea>
                <div class="grid-2" style="margin:1rem 0">
                    <input id="ai-count" type="number" value="10" min="1" max="100" class="input">
                    <select id="ai-diff" class="select"><option>easy</option><option selected>medium</option><option>hard</option></select>
                </div>
                <button onclick="generateAI()" class="btn-primary" style="width:100%"><i class="fas fa-cogs"></i> Generate Questions</button>
                <div id="ai-output" style="margin-top:1.5rem"></div>
            </div>`;
        const sel = document.getElementById('ai-course');
        if(sel && allCourses.length) sel.innerHTML = '<option value="">-- select course --</option>' + allCourses.map(c => `<option value="${c.id}">${c.course_name}</option>`).join('');
    }

    window.generateAI = () => {
        const courseId = document.getElementById('ai-course').value;
        if(!courseId) { alert('Select a course'); return; }
        const topics = document.getElementById('ai-topics').value || 'nursing';
        const count = Math.min(100, parseInt(document.getElementById('ai-count').value) || 10);
        const diff = document.getElementById('ai-diff').value;
        
        const templates = [
            { q: `What is the primary function of ${topics.split(',')[0]} in the human body?`, ans: "Maintain homeostasis", opts: ["Regulate metabolism", "Transport oxygen", "Fight infection", "Maintain homeostasis"] },
            { q: `Which medication is commonly used for ${topics.split(',')[0] || 'hypertension'}?`, ans: "Lisinopril", opts: ["Metformin", "Lisinopril", "Warfarin", "Prednisone"] },
            { q: `What is the normal range for ${topics.split(',')[0] || 'blood pressure'}?`, ans: "120/80 mmHg", opts: ["90/60", "120/80", "140/90", "160/100"] },
            { q: `Which nursing intervention is priority for a patient with ${topics.split(',')[0] || 'chest pain'}?`, ans: "Assess ABCs", opts: ["Give pain meds", "Call doctor", "Assess ABCs", "Start IV"] }
        ];
        
        let generated = [];
        for(let i=0; i<count; i++) {
            let template = templates[i % templates.length];
            generated.push({
                question: template.q,
                answer: template.ans,
                options: template.opts,
                difficulty: diff
            });
        }
        
        document.getElementById('ai-output').innerHTML = `
            <h3>✨ Generated ${generated.length} questions <button onclick="saveAllAI('${courseId}', ${JSON.stringify(generated).replace(/"/g, '&quot;')})" class="btn-success" style="margin-left:1rem">Save All to Database</button></h3>
            <div id="ai-list">${generated.map((g,i)=>`
                <div class="folder" style="margin-bottom:0.8rem">
                    <strong>${g.question}</strong><br>
                    Options: ${g.options.join(' · ')}<br>
                    ✅ ${g.answer}
                    <button onclick="saveSingleAI('${courseId}', ${i}, ${JSON.stringify(generated).replace(/"/g, '&quot;')})" class="btn-primary" style="padding:4px 12px; margin-top:8px">Save One</button>
                </div>
            `).join('')}</div>`;
        window.aiCache = generated;
    };
    
    window.saveSingleAI = async (courseId, idx, cache) => {
        const g = cache[idx];
        const payload = { question_text: g.question, correct_answer: g.answer, course_id: courseId, option_a: g.options[0], option_b: g.options[1], option_c: g.options[2], option_d: g.options[3], difficulty: g.difficulty, question_type: 'multiple_choice', curriculum: 'KRCHN', is_active: true, created_at: new Date().toISOString() };
        const { error } = await supabase.from('medical_assessments').insert([payload]);
        if(error) alert(error.message); else { alert('Saved!'); refreshStats(); }
    };
    window.saveAllAI = async (courseId, cache) => { for(let i=0;i<cache.length;i++) await saveSingleAI(courseId, i, cache); alert(`✅ ${cache.length} AI questions saved`); refreshStats(); };

    // ==================== QUESTION BANK (FULL CRUD) ====================
    async function renderBank() {
        const { data: questions, error } = await supabase.from('medical_assessments').select('*, courses(course_name)').order('created_at', { ascending: false }).limit(200);
        currentQuestions = questions || [];
        mainPanel.innerHTML = `
            <div class="card">
                <h2><i class="fas fa-database"></i> Question Bank · ${currentQuestions.length} total</h2>
                <div style="display:flex; gap:1rem; margin:1rem 0; flex-wrap:wrap">
                    <input type="text" id="search-questions" class="input" placeholder="Search questions..." style="flex:1" onkeyup="filterQuestions()">
                    <button onclick="exportToCSV()" class="btn-success"><i class="fas fa-download"></i> Export CSV</button>
                    <button onclick="showBulkDelete()" class="btn-danger"><i class="fas fa-trash"></i> Bulk Delete</button>
                </div>
                <div id="questions-list"></div>
            </div>`;
        renderQuestionsList(currentQuestions);
    }
    
    function renderQuestionsList(questions) {
        const container = document.getElementById('questions-list');
        if(!container) return;
        if(questions.length === 0) { container.innerHTML = '<div class="badge">No questions found</div>'; return; }
        container.innerHTML = questions.map(q => `
            <div class="folder" style="margin-bottom:1rem; cursor:default" id="q-${q.id}">
                <div style="display:flex; justify-content:space-between; align-items:start">
                    <div style="flex:1">
                        <strong>${q.question_text || 'No text'}</strong>
                        <div style="font-size:0.75rem; color:#64748b; margin-top:4px">Course: ${q.courses?.course_name || 'Unknown'} | Difficulty: ${q.difficulty || 'medium'}</div>
                        <div style="margin-top:8px">✅ Correct: ${q.correct_answer}</div>
                        ${q.explanation ? `<div style="font-size:0.8rem; margin-top:6px; background:#f8fafc; padding:8px; border-radius:12px">📖 ${q.explanation}</div>` : ''}
                    </div>
                    <div>
                        <button onclick="editQuestion('${q.id}')" class="btn-warning" style="padding:6px 12px; margin-right:8px"><i class="fas fa-edit"></i> Edit</button>
                        <button onclick="deleteSingleQuestion('${q.id}')" class="btn-danger" style="padding:6px 12px"><i class="fas fa-trash"></i> Delete</button>
                    </div>
                </div>
            </div>
        `).join('');
    }
    
    window.filterQuestions = () => {
        const search = document.getElementById('search-questions')?.value.toLowerCase() || '';
        const filtered = currentQuestions.filter(q => q.question_text?.toLowerCase().includes(search));
        renderQuestionsList(filtered);
    };
    
    window.deleteSingleQuestion = async (id) => {
        if(confirm('Delete this question permanently?')) {
            await supabase.from('medical_assessments').delete().eq('id', id);
            await renderBank();
            await refreshStats();
        }
    };
    
    window.editQuestion = async (id) => {
        const q = currentQuestions.find(qq => qq.id === id);
        if(!q) return;
        const newText = prompt('Edit question text:', q.question_text);
        if(newText !== null) {
            const newAnswer = prompt('Edit correct answer:', q.correct_answer);
            if(newAnswer !== null) {
                await supabase.from('medical_assessments').update({ question_text: newText, correct_answer: newAnswer }).eq('id', id);
                await renderBank();
            }
        }
    };
    
    window.exportToCSV = () => {
        if(!currentQuestions.length) { alert('No questions to export'); return; }
        const headers = ['Question', 'Correct Answer', 'Course', 'Difficulty', 'Explanation'];
        const rows = currentQuestions.map(q => [q.question_text, q.correct_answer, q.courses?.course_name || '', q.difficulty, q.explanation || '']);
        const csv = [headers, ...rows].map(row => row.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(',')).join('\n');
        const blob = new Blob([csv], { type: 'text/csv' });
        const link = document.createElement('a'); link.href = URL.createObjectURL(blob); link.download = `questions_export_${Date.now()}.csv`; link.click();
        URL.revokeObjectURL(link.href);
        alert('Export complete!');
    };
    
    window.showBulkDelete = () => {
        if(!currentQuestions.length) { alert('No questions to delete'); return; }
        if(confirm(`⚠️ DELETE ALL ${currentQuestions.length} QUESTIONS? This cannot be undone!`)) {
            supabase.from('medical_assessments').delete().neq('id', '00000000-0000-0000-0000-000000000000').then(async () => { await renderBank(); await refreshStats(); alert('All questions deleted'); });
        }
    };

    // ==================== STUDENT MANAGEMENT ====================
    async function renderStudents() {
        const { data } = await supabase.from('consolidated_user_profiles_table').select('*').limit(100);
        mainPanel.innerHTML = `
            <div class="card">
                <h2><i class="fas fa-users"></i> Student Management · ${data?.length || 0} enrolled</h2>
                <div class="table-wrapper" style="overflow-x:auto">
                    <table style="width:100%; border-collapse:collapse">
                        <thead><tr style="background:#f1f5f9"><th style="padding:12px; text-align:left">Name</th><th>Email</th><th>Role</th><th>Program</th><th>Actions</th></tr></thead>
                        <tbody>${data?.map(s => `
                            <tr style="border-bottom:1px solid #e2e8f0">
                                <td style="padding:10px">${s.full_name || '—'}</td>
                                <td>${s.email}</td>
                                <td><span class="badge" style="background:#e0e7ff">${s.role || 'student'}</span></td>
                                <td>${s.program || 'General'}</td>
                                <td><button onclick="promoteToAdmin('${s.id}')" class="btn-warning" style="padding:4px 12px">Make Admin</button></td>
                            </tr>
                        `).join('')}</tbody>
                    </table>
                </div>
            </div>`;
    }
    
    window.promoteToAdmin = async (userId) => {
        if(confirm('Promote this user to admin?')) {
            await supabase.from('consolidated_user_profiles_table').update({ role: 'admin' }).eq('id', userId);
            await renderStudents();
            alert('User is now admin');
        }
    };

    // ==================== COURSE MANAGEMENT ====================
    async function renderCourses() {
        const { data } = await supabase.from('courses').select('*');
        mainPanel.innerHTML = `
            <div class="card">
                <h2><i class="fas fa-book"></i> Course Management</h2>
                <button onclick="addNewCourse()" class="btn-success" style="margin-bottom:1rem"><i class="fas fa-plus"></i> Add New Course</button>
                <div class="grid-2">${data?.map(c => `
                    <div class="folder" style="cursor:default">
                        <strong>${c.course_name}</strong><br>
                        <span style="font-size:0.75rem">Code: ${c.unit_code || 'N/A'}</span><br>
                        <span style="font-size:0.75rem">Program: ${c.target_program || 'All'}</span><br>
                        <span class="badge" style="background:${c.status === 'Active' ? '#d1fae5' : '#fee2e2'}">${c.status || 'Active'}</span>
                        <div style="margin-top:10px">
                            <button onclick="editCoursePrompt('${c.id}', '${c.course_name}')" class="btn-warning" style="padding:4px 12px">Edit</button>
                            <button onclick="toggleCourseStatus('${c.id}', '${c.status}')" class="btn-primary" style="padding:4px 12px">Toggle Status</button>
                        </div>
                    </div>
                `).join('')}</div>
            </div>`;
    }
    
    window.addNewCourse = async () => {
        const name = prompt('Enter course name:');
        if(name) {
            const { error } = await supabase.from('courses').insert([{ course_name: name, status: 'Active', created_at: new Date().toISOString() }]);
            if(error) alert(error.message); else { await loadCourses(); await renderCourses(); await refreshStats(); alert('Course added'); }
        }
    };
    window.editCoursePrompt = async (id, oldName) => { const newName = prompt('Edit course name:', oldName); if(newName) await supabase.from('courses').update({ course_name: newName }).eq('id', id); await renderCourses(); await loadCourses(); };
    window.toggleCourseStatus = async (id, current) => { const newStatus = current === 'Active' ? 'Inactive' : 'Active'; await supabase.from('courses').update({ status: newStatus }).eq('id', id); await renderCourses(); await loadCourses(); };

    // ==================== PAGE NAVIGATION ====================
    window.showPage = (page) => {
        if(page === 'rapid') renderRapid();
        else if(page === 'bulk') renderBulk();
        else if(page === 'ai') renderAI();
        else if(page === 'bank') renderBank();
        else if(page === 'students') renderStudents();
        else if(page === 'courses') renderCourses();
    };
</script>
</body>
</html>
